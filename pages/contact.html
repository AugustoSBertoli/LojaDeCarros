<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=League+Gothic&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <title>Carros Top</title>
</head>

<body>
    <header>
        <img src="../img/logo.png" alt="logo carros top" class="logo">
        <nav>
            <ul class="links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="./cars.html">Carros</a></li>
                <li><a href="./contact.html">Fale Conosco</a></li>
            </ul>
        </nav>
    </header>

    <section class="info-container">
        <h1 class="title">Entre em <span>Contato</span></h1>

        <div class="forms">
            <form class="contact-form">

                <div class="input-group">
                    <label for="name">Nome</label>
                    <input type="text" id="name" placeholder="Seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seuemail@email.com" required>
                </div>

                <div class="input-group">
                    <label for="phone">Telefone</label>
                    <input type="tel" id="phone" placeholder="(11) 99999-9999">
                </div>

                <div class="input-group">
                    <label for="message">Mensagem</label>
                    <textarea id="message" rows="4" placeholder="Digite sua mensagem..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Mensagem</button>

            </form>
        </div>

        <div>
            <div class="endereco-mapa">
                <a href="https://www.google.com/maps/search/?api=1&query=Rua+Da+Loja+77+São+Paulo+SP">
                    <img class="img-mapa" src="../img/mapaloja.png" alt="imagem do maps da loja">
                </a>
                <h2>Endereço:</h2>
                <p>Rua Da Loja, 77 - São Paulo, SP</p>
            </div>
        </div>
        <div class="information">
            <div class="whats">
                <a href="https://wa.me/5511999999999">
                    <img src="../img/whatsapp.png" class="img-whats">
                </a>
                <div class="whats-text">
                    <p>WhatsApp</p>
                    <p>(11) 99999-9999</p>
                </div>
            </div>

            <div class="horario">
                <h2>Horário de funcionamento</h2>
                <p>Segunda a Sexta: 9h às 18h <br> Sábado: 9h às 14h</p>
            </div>
        </div>


    </section>

    <footer class="rodape">
        <p>Desenvolvido por Augusto De Souza Bertoli</p>
    </footer>
</body>

</html>
